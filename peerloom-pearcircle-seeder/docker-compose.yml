version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: peerloom-pearcircle-seeder_app_1
      APP_PORT: 8730

  app:
    image: ghcr.io/peerloomllc/pearcircle-seeder:0.1.2@sha256:806b79457382b72f22dbceed060a8b907e5b7372d36bb49cfca2ab7bd4424805
    restart: on-failure
    stop_grace_period: 1m
    security_opt:
      - no-new-privileges:true
    environment:
      SEEDER_HOST: 0.0.0.0
      SEEDER_PORT: "8730"
      SEEDER_NO_AUTH: "1"
    volumes:
      - ${APP_DATA_DIR}/data:/data
