version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: peerloom-pearcircle-seeder_app_1
      APP_PORT: 8730

  app:
    image: ghcr.io/peerloomllc/pearcircle-seeder:0.1.5@sha256:a197ad34047236b8959a1ae12e9801432c43296cdddf1367ba709162f5c3119f
    restart: on-failure
    stop_grace_period: 1m
    security_opt:
      - no-new-privileges:true
    environment:
      SEEDER_HOST: 0.0.0.0
      SEEDER_PORT: "8730"
      SEEDER_NO_AUTH: "1"
    volumes:
      - ${APP_DATA_DIR}/data:/data
